version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hackathon
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/hackathon
      ML_SERVICE_URL: http://ml_service:8000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./frontend:/frontend

  ml_service:
    build: ./ml_service
    ports:
      - "8001:8000"
    environment:
      REDIS_HOST: redis
      MODELS_DIR: /app/models
    volumes:
      - ./tenderhack/tenderhack/models:/app/models:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  postgres_data:
