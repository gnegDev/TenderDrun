version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hackathon
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8080:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/hackathon
      ML_SERVICE_URL: http://ml_service:8001
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./frontend:/frontend

  ml_service:
    build: ./ml_service
    ports:
      - "8001:8001"

volumes:
  postgres_data:
